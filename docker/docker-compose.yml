version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: superpao_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: superpao
      POSTGRES_PASSWORD: superpao
      POSTGRES_DB: superpao
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U superpao']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    container_name: superpao_api
    restart: unless-stopped
    env_file: ../.env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    container_name: superpao_web
    restart: unless-stopped
    env_file: ../.env
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
